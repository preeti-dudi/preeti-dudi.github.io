<!DOCTYPE html>
<html lang=en>
<head>
    <meta charset="UTF-8">
    <title>Cafeteria</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <script src="javascript.js" async></script>
    <script src="bootstrap.js" async></script>
    <link href="style.css" rel="stylesheet">
    <link href="bootstrap.css" rel="stylesheet">


    <style>
        form{
            background-color: rgb(243, 240, 236);
            padding:10px;
        }
    </style>
</head>
<body>
    
    
    <nav class="navbar navbar-expand-sm navbar-light" id="primary-nav">
        <img class="navbar-hrand logo" id="logo" src="images/logo.jpg" alt="Office Cafetaria App">
       <div class="nav justify-content-end" id="links">
            <ul class="nav  justify-content-end">
               <li class="nav-item">
                 <a class="nav-link" href="register.html">Register</a>
               </li>
               <li class="nav-item">
                 <a class="nav-link" href="login.html">Login</a>
               </li>
            </ul>
         </div>
     </nav>
     <div class="container">
        <h1 class="label">Login</h1>
        <form action="" class="was-validated needs-validation text-center" novalidate>
           <div class="form-group row">
               <label class="col-sm-4" for="registration-id">Registration ID:</label>
               <div class="col-sm-8">
                   <input type="text" class="form-control" name="reg-id" id="regid" required>
                </div>
           </div>
           <div class="form-group row">
               <label class="col-sm-4" for="pswd">Password:</label>
               <div class="col-sm-8">
                   <input type="password" class="form-control" name="pswd" id="pswd" required>
                </div>
           </div>
           <button type="cancel" class="bttn bttn-outline">Cancel</button>
           <button type="submit" class="bttn">Preview</button>
        </form>
    </div>
</body>
</html>
