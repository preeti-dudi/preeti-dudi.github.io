<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sidebar</title>
    <!-- Icon -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">

    <!--Font-->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
    :root {
  --color-yellow: #FFC300;
  --color-dark: #393e46;
}

* {
  padding: 0;
  margin: 0;
}

body {
  font-family: "Poppins", sans-serif;
  font-weight: 300;
  background-size: cover;
  background-position: center;
  height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

nav {
  background-color: var(--color-yellow);
  color: #fff;
  font-size: 1.4em;
  padding: 0.5rem 1rem;
  display: -webkit-box;
  display: -ms-flexbox;
  display: flex;
  -webkit-box-align: center;
      -ms-flex-align: center;
          align-items: center;
  -webkit-box-shadow: 0 0 4px rgba(0, 0, 0, 0.2);
          box-shadow: 0 0 4px rgba(0, 0, 0, 0.2);
}

.hamburger {
  -webkit-transform: translateY(3px);
          transform: translateY(3px);
  margin-right: 1rem;
  cursor: pointer;
}

.backdrop {
  position: fixed;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.4);
  display: none;
}

.backdrop--active {
  display: block;
}

.sidebar {
  position: absolute;
  top: 0;
  left: 0;
  width: 70%;
  height:100%;
  max-width: 18rem;

  -webkit-transition: all 1s cubic-bezier(0.075, 0.82, 0.165, 1);
  transition: all 1s cubic-bezier(0.075, 0.82, 0.165, 1);
  -webkit-box-shadow: 0 0 4px rgba(0, 0, 0, 0.2);
          box-shadow: 0 0 4px rgba(0, 0, 0, 0.2);
  background-color: var(--color-dark);
  -webkit-transform: translateX(-100%);
          transform: translateX(-100%);
}

.sidebar--active {
  -webkit-transform: translateX(0);
          transform: translateX(0);
}

.sidebar__profile {
  padding: 1rem 1.5rem;
  display: -webkit-box;
  display: -ms-flexbox;
  display: flex;
  border-bottom: 2px solid rgba(2, 2, 2, 0.1);
  -webkit-box-align: center;
      -ms-flex-align: center;
          align-items: center;
}

.sidebar__profile img {
  width: 4rem;
  height: 4rem;
  border-radius: 50%;
  margin-right: 1rem;
  -webkit-transform: translateX(-0.3rem);
          transform: translateX(-0.3rem);
}

.sidebar__profile h1 {
  font-size: 1em;
  margin-bottom: 6px;
  color: var(--color-yellow);
}

.sidebar__profile p {
  font-size: 10px;
  color: #eee;
}

.sidebar__list {
  list-style: none;
}

.sidebar__item {
  padding: 1rem 1.5rem;
  font-size: 1.2em;
  position: relative;
  overflow: hidden;
  cursor: pointer;
}

.sidebar__item a {
  text-decoration: none;
  color: #eee;
  display: -webkit-box;
  display: -ms-flexbox;
  display: flex;
  -webkit-box-align: center;
      -ms-flex-align: center;
          align-items: center;
}

.sidebar__item i {
  margin-right: 0.5rem;
}

.sidebar__item::after {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  height: 0;
  width: 2px;
  background-color: var(--color-yellow);
  -webkit-transition: height 0.5s 0.4s, width 0.5s;
  transition: height 0.5s 0.4s, width 0.5s;
  z-index: -1;
}

.sidebar__item:hover::after {
  -webkit-transition: height 0.5s 0.1s, width 0.5s 0.4s;
  transition: height 0.5s 0.1s, width 0.5s 0.4s;
  height: 100%;
  width: 100%;
}

.sidebar__item:hover {
  color: var(--color-dark);
}

/* YouTube Style */
.the-blood-coders__learn-it-btn,
.the-blood-coders__learn-it-btn:link,
.the-blood-coders__learn-it-btn:active,
.the-blood-coders__learn-it-btn:visited {
  padding: 0.5rem;
  background-color: #ff0000;
  position: absolute;
  width: 170px;
  bottom: 3rem;
  color: #fff;
  font-family: "Poppins", sans-serif;
  text-decoration: none;
  border-radius: 4px;
  display: -webkit-box;
  display: -ms-flexbox;
  display: flex;
  -webkit-box-align: center;
  -ms-flex-align: center;
  align-items: center;
  -webkit-box-pack: center;
  -ms-flex-pack: center;
  justify-content: center;
  font-weight: 400;
  -webkit-box-shadow: 0 0 1rem rgba(0, 0, 0, 0.2);
  box-shadow: 0 0 1rem rgba(0, 0, 0, 0.2);
  left: 50%;
  -webkit-transform: translateX(-50%);
  transform: translateX(-50%);
  z-index: -1;
}

.the-blood-coders__learn-it-btn:active {
  -webkit-box-shadow: 0 0 0rem rgba(0, 0, 0, 0);
  box-shadow: 0 0 0rem rgba(0, 0, 0, 0);
  -webkit-transform: translateX(-50%) scale(0.99);
  transform: translateX(-50%) scale(0.99);
}

.the-blood-coders__btn-icon {
  font-size: 1.6em;
  margin-right: 0.5rem;
}

.the-blood-coders__backdrop {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.644);
  display: -webkit-box;
  display: -ms-flexbox;
  display: flex;
  -webkit-box-pack: center;
  -ms-flex-pack: center;
  justify-content: center;
  -webkit-box-align: center;
  -ms-flex-align: center;
  align-items: center;
}

.the-blood-coders__popup {
  width: 18rem;
  background-color: white;
  padding: 1rem;
  border-radius: 4px;
  font-family: "Poppins", sans-serif;
  text-align: center;
  -webkit-box-shadow: 0 0 1rem rgba(0, 0, 0, 0.1);
  box-shadow: 0 0 1rem rgba(0, 0, 0, 0.1);
}

.the-blood-coders__popup-header,
.the-blood-coders__popup-header:link,
.the-blood-coders__popup-header:visited {
  font-size: 1.2em;
  font-weight: 600;
  margin-top: -2.6rem;
  margin-bottom: 2rem;
  background-image: -webkit-gradient(linear, left bottom, right top, from(#e90606), to(#ff4a4a));
  background-image: linear-gradient(to right top, #e90606, #ff4a4a);
  color: #f1f1f1;
  padding: 0.5rem 1rem;
  display: -webkit-box;
  display: -ms-flexbox;
  display: flex;
  -webkit-box-align: center;
  -ms-flex-align: center;
  align-items: center;
  -webkit-box-pack: center;
  -ms-flex-pack: center;
  justify-content: center;
  border-radius: 1px;
  -webkit-transform: skew(-10deg) rotate(-3deg);
  transform: skew(-10deg) rotate(-3deg);
  -webkit-box-shadow: 0 0 1rem rgba(0, 0, 0, 0.2);
  box-shadow: 0 0 1rem rgba(0, 0, 0, 0.2);
  -webkit-tap-highlight-color: transparent;
  text-decoration: none;
}

.the-blood-coders__code-name {
  font-size: 1.2em;
  margin-bottom: 1rem;
}

.the-blood-coders__code-name--span {
  background-image: -webkit-gradient(linear, left bottom, right top, from(#faaa05), to(#fbd786));
  background-image: linear-gradient(to right top, #faaa05, #fbd786);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.the-blood-coders__link {
  word-break: break-all;
  line-height: 1.4;
  display: block;
  color: #1d1dfa;
  margin-bottom: 1.2rem;
}

.the-blood-coders__ok-btn,
.the-blood-coders__ok-btn:link,
.the-blood-coders__ok-btn:active,
.the-blood-coders__ok-btn:visited {
  text-transform: uppercase;
  margin-top: 1rem;
  display: inline-block;
  padding: 0.5rem 2rem;
  color: #ffffff;
  background-image: -webkit-gradient(linear, left top, right top, from(#faaa05), to(#fbd786));
  background-image: linear-gradient(to right, #faaa05, #fbd786);
  font-family: "Poppins", sans-serif;
  text-decoration: none;
  font-weight: 400;
  -webkit-tap-highlight-color: transparent;
  -webkit-transform: skew(-10deg) rotate(-3deg);
  transform: skew(-10deg) rotate(-3deg);
  -webkit-box-shadow: 0 0 1rem rgba(0, 0, 0, 0.1);
  box-shadow: 0 0 1rem rgba(0, 0, 0, 0.1);
}
</style>
    
</head>

<body>

    <nav>
        <div class="hamburger">
            <i class="ri-menu-line"></i>
        </div>
        <div class="nav-text">Sidebar Tutorial</div>
    </nav>

    <div class="backdrop"></div>

    <div class="sidebar">
        <div class="sidebar__profile">
            <img src="https://thebloodcoders.github.io/resources/images/logo.jpg" alt="logo">

            <div>
                <h1>Blood Coders</h1>
                <p>xyz@gmail.com</p>
            </div>

        </div>

        <div class="sidebar__list">

            <li class="sidebar__item">
                <a><i class="ri-home-line"></i>Home</a>
            </li>
            <li class="sidebar__item">
                <a><i class="ri-information-line"></i>About</a>
            </li>

            <li class="sidebar__item">
                <a><i class="ri-pencil-ruler-2-line"></i>Skills</a>
            </li>

            <li class="sidebar__item">
                <a><i class="ri-image-2-line"></i>Portfolio</a>
            </li>

            <li class="sidebar__item">
                <a><i class="ri-settings-3-line"></i>Settings</a>
            </li>

            <li class="sidebar__item">
                <a href="https://youtu.be/2vNqjP3Vpw0" target="_blank"><i class="ri-youtube-fill"></i>Learn It</a>
            </li>

        </div>

    </div>

    <script src="script.js"></script>

    <!--  YouTube Style  -->
    <a href="https://youtu.be/2vNqjP3Vpw0" class="the-blood-coders__learn-it-btn" target="_blank">
        <i class="ri-youtube-fill the-blood-coders__btn-icon"></i>
        Learn it
    </a>


    <div class="the-blood-coders__backdrop">
        <div class="the-blood-coders__popup">
            <a href="https://youtu.be/2vNqjP3Vpw0" class="the-blood-coders__popup-header" target="_blank">
                <i class="ri-youtube-fill the-blood-coders__btn-icon"></i>TheBloodCoders
            </a>

            <h1 class="the-blood-coders__code-name">
                <span class="the-blood-coders__code-name--span">Responsive Sidebar
            </h1>

            <a href="https://youtu.be/2vNqjP3Vpw0" class="the-blood-coders__link" target="_blank">https://youtu.be/2vNqjP3Vpw0</a>
            <a href="#" class="the-blood-coders__ok-btn">Ok</a>
        </div>
    </div>
<script>
window.onload = () => {


    const backdrop = document
        .querySelector('.backdrop');

    const sidebar = document
        .querySelector('.sidebar');

    document
        .querySelector('.hamburger')
        .addEventListener('click', () => {
            toggleSidebar();
        });

    backdrop
        .addEventListener('click', () => {
            toggleSidebar();
        });

    const btnOk = document.querySelector('.the-blood-coders__ok-btn');

    btnOk.addEventListener('click', (e) => {
        e.target.closest('.the-blood-coders__backdrop').remove();
    });

    const toggleSidebar = () => {
        backdrop.classList.toggle('backdrop--active');
        sidebar.classList.toggle('sidebar--active');
    }
}</script>
</body>

</html>
